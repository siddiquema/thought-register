<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thought Register</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header>
  <h1>Thought Register</h1>
</header>
<main>
  <section id="capture">
    <div class="mode-toggle" role="tablist">
      <button type="button" id="mode-quick" class="mode-btn active" role="tab" aria-selected="true">Quick</button>
      <button type="button" id="mode-structured" class="mode-btn" role="tab" aria-selected="false">Structured</button>
    </div>

    <form id="quick-form" class="capture-form">
      <label for="quick-topic">Topic <span class="optional">(optional)</span></label>
      <input type="text" id="quick-topic" name="topic" placeholder="Topic">

      <label for="quick-thought">Thought</label>
      <textarea id="quick-thought" name="thought" placeholder="What's on your mind?" required autofocus></textarea>

      <button type="submit">Save</button>
    </form>

    <form id="structured-form" class="capture-form" hidden>
      <label for="structured-topic">Topic <span class="optional">(optional)</span></label>
      <input type="text" id="structured-topic" name="topic" placeholder="Topic">

      <label for="structured-observation">Observation</label>
      <textarea id="structured-observation" name="observation" placeholder="What did you observe?" required></textarea>

      <label for="structured-interpretation">Interpretation <span class="optional">(optional)</span></label>
      <textarea id="structured-interpretation" name="interpretation" placeholder="What does it mean?"></textarea>

      <button type="submit">Save</button>
    </form>

    <p id="save-confirmation" class="confirmation" aria-live="polite"></p>
  </section>

  <section id="log">
    <h2>Captured</h2>
    <ul id="thought-list"></ul>
    <p id="empty-state" class="empty-state">Nothing captured yet.</p>
  </section>
</main>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
